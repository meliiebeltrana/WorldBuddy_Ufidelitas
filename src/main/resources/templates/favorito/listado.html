<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Favoritos</title>

    <link rel="stylesheet" href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="/webjars/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/estilos.css}"/>
</head>

<body class="bg-light">

<header th:replace="~{general/fragmentos :: header}"></header>

<div class="container mt-4">

    <h2 class="mb-4">Ciudades favoritas</h2>

    <div th:if="${param.agregado}" class="alert alert-success">
        Ciudad agregada a favoritos correctamente.
    </div>

    <div th:if="${param.eliminado}" class="alert alert-success">
        Ciudad eliminada de favoritos correctamente.
    </div>

    <table class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th>Ciudad</th>
            <th>Hora</th>
            <th>Clima</th>
            <th>Temperatura</th>
            <th>Día/Noche</th>
            <th>País</th>
            <th>Acción</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="f : ${favoritos}">
            <td th:text="${f.ciudad.nombreCiudad}"></td>

            <td>
                <span class="reloj-ciudad"
                      th:data-hora="${f.ciudad.hora}"
                      th:text="${f.ciudad.hora}">
                </span>
            </td>

            <td th:text="${f.ciudad.clima}"></td>
            <td th:text="${f.ciudad.temperatura + ' °C'}"></td>

            <td>
                <span class="dia-noche"
                      th:data-hora="${f.ciudad.hora}"
                      th:text="${f.ciudad.diaNoche}">
                </span>
            </td>

            <td th:text="${f.ciudad.pais.nombrePais}"></td>

            <td>
                <a th:href="@{/favorito/eliminar/} + ${f.idFavorito}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Desea eliminar esta ciudad de favoritos?')">
                    <i class="fa fa-trash"></i> Quitar
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/ciudad/listado}" class="btn btn-primary">
        Volver a ciudades
    </a>

</div>

<footer th:replace="~{general/fragmentos :: footer}"></footer>

<script src="/webjars/jquery/3.7.1/jquery.min.js"></script>
<script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/rutinas.js}"></script>

</body>
</html>
