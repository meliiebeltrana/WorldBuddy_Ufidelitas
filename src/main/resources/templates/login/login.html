<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Login - World Buddy</title>
        <meta charset="UTF-8"/>

        <!-- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- Tus estilos -->
        <link rel="stylesheet" th:href="@{/css/estilos.css}">
    </head>
    <body>

        <div class="container mt-5">
            <div class="card mx-auto shadow" style="max-width: 400px;">
                <div class="card-body text-center">

                    <h3 class="mb-3">🌐 World Buddy</h3>
                    <h5 class="mb-4">Iniciar sesión</h5>

                    <div th:if="${param.error}" class="alert alert-danger">
                        Usuario incorrecto o no tienes cuenta.
                    </div>

                    <div th:if="${param.registro}" class="alert alert-success">
                        Usuario creado con éxito. Ahora puedes iniciar sesión.
                    </div>

                    <form th:action="@{/login}" method="post">

                        <input type="email" name="username" class="form-control mb-3"
                               placeholder="Correo electrónico" required>

                        <div class="input-group mb-3">
                            <input type="password" id="passwordLogin"
                                   name="password" class="form-control"
                                   placeholder="Contraseña" required>

                            <button class="btn btn-success" type="button"
                                    onclick="mostrarClave('passwordLogin')">👁</button>
                        </div>

                        <button class="btn btn-primary w-100">Ingresar</button>
                    </form>

                    <a th:href="@{/registro}" class="d-block mt-3">Crear cuenta</a>

                </div>
            </div>
        </div>

        <!-- JS separado -->
        <script th:src="@{/js/rutinas.js}"></script>

    </body>
</html>
