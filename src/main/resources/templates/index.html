<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>World Buddy</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="/webjars/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/estilos.css}"/>
</head>
<body>

<header th:replace="~{general/fragmentos :: header}"></header>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="alert alert-success text-center">
                Bienvenido <strong th:text="${nombreUsuario}">usuario</strong>
            </div>

            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <h1 class="mb-3">World Buddy</h1>

                    <p class="mb-4">
                        Sistema web para consultar ciudades, hora, clima y favoritos.
                    </p>

                    <div class="d-grid gap-2 col-6 mx-auto">
                        <a th:href="@{/ciudad/listado}" class="btn btn-primary">
                            Ver ciudades
                        </a>

                        <a th:href="@{/favorito/listado}" class="btn btn-success">
                            Ver favoritos
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</main>

<footer th:replace="~{general/fragmentos :: footer}"></footer>

<script src="/webjars/jquery/3.7.1/jquery.min.js"></script>
<script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/rutinas.js}"></script>

</body>
</html>
