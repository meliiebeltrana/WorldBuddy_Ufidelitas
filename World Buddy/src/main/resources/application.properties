spring.application.name=World Buddy
#Puerto por donde escucha nuestro servidor web
server.port=80

# para definir el fromato de salida del log en cuanto a horas y minutos
logging.pattern.dateformat=hh:mm

#evitamos la salida del banner de spring
spring.main.banner-mode=off

#definimos el cache como false en desarrollo, en produccion sera true
spring.thymeleaf.cache=false

#Conexi\u00c3\u00b3n local a la BD techshop en MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/worldbuddy_db

#Usuario y clave para ingresar a la BD
spring.datasource.username=worldbuddy_user
spring.datasource.password=1234

#Driver y Plataforma de comunicaci\u00c3\u00b3n
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#Mostrar informar en el log de BD
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=debug
logging.level.org.type.descriptor.sql.BasicBinder=trace

# Hibernate actualiza automáticamente las tablas según las entidades Java
spring.jpa.hibernate.ddl-auto=update

# Muestra en la consola las consultas SQL que ejecuta el sistema
spring.jpa.show-sql=true


